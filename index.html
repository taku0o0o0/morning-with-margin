<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Morning with Margin</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
            --blur-bg: rgba(255, 255, 255, 0.82);
            --safe-top: env(safe-area-inset-top, 47px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 440px;
            max-height: 956px;
            background: #ffffff;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 769px) {
            .app-container {
                border-radius: 40px;
                height: 92vh;
            }
        }

        .viewer-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 1;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pointer-aim {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .app-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding-top: calc(var(--safe-top) + 14px);
            padding-left: 24px;
            padding-right: 24px;
            z-index: 10;
            pointer-events: none;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-color);
            text-shadow: 0 1px 8px rgba(255,255,255,0.4);
        }

        .result-card {
            position: absolute;
            top: 130px;
            left: 24px;
            right: 24px;
            background: var(--blur-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 18px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .result-card.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .main-color-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-color-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
        }

        .color-meta {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.4;
            margin-bottom: 6px;
        }

        .palette-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .palette-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .palette-box {
            width: 100%;
            height: 40px;
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
            transition: background-color 0.3s ease;
        }

        .palette-hex {
            font-size: 10px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            opacity: 0.6;
        }

        .divider {
            height: 1px;
            background: rgba(0,0,0,0.06);
            width: 100%;
        }

        .bottom-navigation {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding-bottom: calc(var(--safe-bottom) + 20px);
            padding-left: 24px;
            padding-right: 24px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .segment-control {
            background: var(--blur-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.5);
            pointer-events: auto;
        }

        .segment-btn {
            border: none;
            background: transparent;
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: #8e8e93;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .segment-btn .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .segment-btn img {
            width: 18px;
            height: 18px;
            opacity: 0.5;
            transition: opacity 0.25s ease;
        }

        .segment-btn.active {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .segment-btn.active img {
            opacity: 1;
        }

        .action-circle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.15s ease;
        }

        .action-circle-btn:active { transform: scale(0.92); }
        .action-circle-btn svg { width: 20px; height: 20px; color: var(--text-color); }

        /* ===== LEARNING MODE ===== */
        .camera-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 2;
            transition: opacity 0.4s ease;
            padding: calc(var(--safe-top) + 64px) 24px calc(var(--safe-bottom) + 90px) 24px;
            overflow-y: auto;
        }

        .camera-placeholder.hidden { opacity: 0; pointer-events: none; }

        /* Color Wheel Section */
        .color-wheel-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .color-wheel-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            cursor: crosshair;
        }

        #colorWheelCanvas {
            border-radius: 50%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }

        .wheel-center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.15);
            pointer-events: none;
        }

        .wheel-selector {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: left 0.15s ease, top 0.15s ease;
        }

        .wheel-result-card {
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            transition: opacity 0.3s ease;
        }

        .wheel-result-card.hidden { opacity: 0; }

        .wheel-main-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wheel-color-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
            transition: background-color 0.2s ease;
            flex-shrink: 0;
        }

        .wheel-color-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .wheel-color-hex {
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }

        .wheel-color-hsl {
            font-size: 11px;
            color: #8e8e93;
            font-weight: 500;
        }

        .wheel-palette-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .wheel-palette-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8e8e93;
        }

        .wheel-palette-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .wheel-palette-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .wheel-palette-swatch {
            width: 100%;
            height: 36px;
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
            transition: background-color 0.2s ease;
        }

        .wheel-palette-hex {
            font-size: 9px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #8e8e93;
        }

        /* ===== SEARCH OVERLAY ===== */
        .search-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            border-radius: 28px 28px 0 0;
            z-index: 20;
            padding: 12px 24px 40px;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-overlay.active {
            transform: translateY(0);
        }

        .search-handle {
            width: 36px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 0 auto 4px;
            flex-shrink: 0;
        }

        .search-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .search-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            background: #f5f5f7;
            border: none;
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            color: #1d1d1f;
            outline: none;
            transition: background 0.2s ease;
        }

        .search-input:focus {
            background: #ebebed;
        }

        .search-input::placeholder {
            color: #aeaeb2;
        }

        .search-go-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #1d1d1f;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.15s ease;
        }

        .search-go-btn:active { opacity: 0.7; }
        .search-go-btn svg { width: 18px; height: 18px; color: #fff; }

        .search-result-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .search-result-card {
            background: #f5f5f7;
            border-radius: 18px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-result-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .search-result-swatch {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
            flex-shrink: 0;
        }

        .search-result-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .search-result-name {
            font-size: 15px;
            font-weight: 700;
        }

        .search-result-hex {
            font-size: 13px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #636366;
        }

        .search-result-hsl {
            font-size: 11px;
            color: #aeaeb2;
            font-weight: 500;
        }

        .search-result-palettes {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-result-palette-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8e8e93;
        }

        .search-result-palette-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .search-result-palette-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .search-result-palette-swatch {
            width: 100%;
            height: 32px;
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
        }

        .search-result-palette-hex {
            font-size: 9px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #8e8e93;
        }

        .search-empty {
            text-align: center;
            padding: 24px 0;
            color: #aeaeb2;
            font-size: 14px;
            font-weight: 500;
        }

        .search-close-btn {
            position: absolute;
            top: 16px;
            right: 24px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0f0f2;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .search-close-btn svg { width: 12px; height: 12px; color: #636366; }

        .overlay-dim {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay-dim.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>Morning with Margin</h1>
        </div>

        <!-- Camera result card -->
        <div class="result-card" id="resultCard">
            <div class="main-color-row">
                <div class="main-color-box" id="pickedColorBox"></div>
                <div class="color-meta">
                    <span class="section-title" style="margin-bottom: 2px;">Selected Clothing</span>
                    <span id="pickedColorHex" style="font-size: 15px; font-weight: 700;">#FFFFFF</span>
                </div>
            </div>
            <div class="divider"></div>
            <div class="palette-container">
                <span class="section-title">Accent Colors（補色）</span>
                <div class="palette-grid">
                    <div class="palette-item"><div class="palette-box" id="comp1"></div><span class="palette-hex" id="comp1Hex"></span></div>
                    <div class="palette-item"><div class="palette-box" id="comp2"></div><span class="palette-hex" id="comp2Hex"></span></div>
                    <div class="palette-item"><div class="palette-box" id="comp3"></div><span class="palette-hex" id="comp3Hex"></span></div>
                </div>
            </div>
            <div class="divider"></div>
            <div class="palette-container">
                <span class="section-title">Tone on Tone（同系色）</span>
                <div class="palette-grid">
                    <div class="palette-item"><div class="palette-box" id="mono1"></div><span class="palette-hex" id="mono1Hex"></span></div>
                    <div class="palette-item"><div class="palette-box" id="mono2"></div><span class="palette-hex" id="mono2Hex"></span></div>
                    <div class="palette-item"><div class="palette-box" id="mono3"></div><span class="palette-hex" id="mono3Hex"></span></div>
                </div>
            </div>
        </div>

        <div class="viewer-area">
            <!-- Learning Mode -->
            <div class="camera-placeholder" id="placeholder">
                <div class="color-wheel-section">
                    <div class="color-wheel-wrapper" id="wheelWrapper">
                        <canvas id="colorWheelCanvas" width="220" height="220"></canvas>
                        <div class="wheel-center-dot"></div>
                        <div class="wheel-selector" id="wheelSelector" style="display:none;"></div>
                    </div>

                    <div class="wheel-result-card hidden" id="wheelResultCard">
                        <div class="wheel-main-row">
                            <div class="wheel-color-box" id="wheelColorBox"></div>
                            <div class="wheel-color-info">
                                <span class="wheel-color-hex" id="wheelColorHex">—</span>
                                <span class="wheel-color-hsl" id="wheelColorHsl">色相環をタップ</span>
                            </div>
                        </div>
                        <div class="divider"></div>
                        <div class="wheel-palette-group">
                            <span class="wheel-palette-label">Accent Colors（補色）</span>
                            <div class="wheel-palette-row">
                                <div class="wheel-palette-item"><div class="wheel-palette-swatch" id="wComp1"></div><span class="wheel-palette-hex" id="wComp1Hex"></span></div>
                                <div class="wheel-palette-item"><div class="wheel-palette-swatch" id="wComp2"></div><span class="wheel-palette-hex" id="wComp2Hex"></span></div>
                                <div class="wheel-palette-item"><div class="wheel-palette-swatch" id="wComp3"></div><span class="wheel-palette-hex" id="wComp3Hex"></span></div>
                            </div>
                        </div>
                        <div class="divider"></div>
                        <div class="wheel-palette-group">
                            <span class="wheel-palette-label">Tone on Tone（同系色）</span>
                            <div class="wheel-palette-row">
                                <div class="wheel-palette-item"><div class="wheel-palette-swatch" id="wMono1"></div><span class="wheel-palette-hex" id="wMono1Hex"></span></div>
                                <div class="wheel-palette-item"><div class="wheel-palette-swatch" id="wMono2"></div><span class="wheel-palette-hex" id="wMono2Hex"></span></div>
                                <div class="wheel-palette-item"><div class="wheel-palette-swatch" id="wMono3"></div><span class="wheel-palette-hex" id="wMono3Hex"></span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pointer-aim" id="pointerAim"></div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display: none;"></canvas>
        </div>

        <!-- Bottom nav -->
        <div class="bottom-navigation">
            <div class="segment-control">
                <button class="segment-btn active" id="btnLeaning">
                    <div class="icon"><img src="pencil_icon.png" alt="Pencil Icon"></div>
                    Leaning
                </button>
                <button class="segment-btn" id="btnCamera">
                    <div class="icon"><img src="camera_icon.png" alt="Camera Icon"></div>
                    Camera
                </button>
            </div>
            <button class="action-circle-btn" id="actionBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <!-- Dim overlay -->
        <div class="overlay-dim" id="overlayDim"></div>

        <!-- Search overlay -->
        <div class="search-overlay" id="searchOverlay">
            <button class="search-close-btn" id="searchCloseBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="search-handle"></div>
            <span class="search-title">色を検索</span>
            <div class="search-input-row">
                <input class="search-input" id="searchInput" type="text" placeholder="色名（赤、navy）またはカラーコード（#FF0000）">
                <button class="search-go-btn" id="searchGoBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
            <div class="search-result-area" id="searchResultArea"></div>
        </div>
    </div>

    <script>
        // ===== ICON GENERATION =====
        function generateIcons() {
            const pencilCanvas = document.createElement('canvas');
            pencilCanvas.width = 64; pencilCanvas.height = 64;
            const pc = pencilCanvas.getContext('2d');
            pc.save(); pc.translate(32, 32); pc.rotate(Math.PI / 4);
            pc.fillStyle = '#1d1d1f'; pc.fillRect(-8, -16, 16, 32);
            pc.beginPath(); pc.moveTo(-8, 16); pc.lineTo(8, 16); pc.lineTo(0, 30); pc.closePath();
            pc.fillStyle = '#d2d2d7'; pc.fill();
            pc.beginPath(); pc.moveTo(-2, 26); pc.lineTo(2, 26); pc.lineTo(0, 30); pc.closePath();
            pc.fillStyle = '#1d1d1f'; pc.fill();
            pc.fillStyle = '#8e8e93'; pc.fillRect(-8, -20, 16, 4);
            pc.restore();
            const pencilUrl = pencilCanvas.toDataURL('image/png');

            const camCanvas = document.createElement('canvas');
            camCanvas.width = 64; camCanvas.height = 64;
            const cc = camCanvas.getContext('2d');
            cc.fillStyle = '#1d1d1f';
            cc.beginPath(); cc.moveTo(10,20); cc.lineTo(24,20); cc.lineTo(28,12); cc.lineTo(36,12);
            cc.lineTo(40,20); cc.lineTo(54,20); cc.quadraticCurveTo(58,20,58,24);
            cc.lineTo(58,48); cc.quadraticCurveTo(58,52,54,52); cc.lineTo(10,52);
            cc.quadraticCurveTo(6,52,6,48); cc.lineTo(6,24); cc.quadraticCurveTo(6,20,10,20);
            cc.closePath(); cc.fill();
            cc.fillStyle = '#ffffff'; cc.beginPath(); cc.arc(32,36,12,0,Math.PI*2); cc.fill();
            cc.fillStyle = '#1d1d1f'; cc.beginPath(); cc.arc(32,36,8,0,Math.PI*2); cc.fill();
            const camUrl = camCanvas.toDataURL('image/png');

            document.querySelectorAll('img[src="pencil_icon.png"]').forEach(i => i.src = pencilUrl);
            document.querySelectorAll('img[src="camera_icon.png"]').forEach(i => i.src = camUrl);
        }
        window.addEventListener('load', generateIcons);

        // ===== COLOR HELPERS =====
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            let h, s, l = (max+min)/2;
            if (max === min) { h = s = 0; } else {
                const d = max - min;
                s = l > 0.5 ? d/(2-max-min) : d/(max+min);
                switch(max) {
                    case r: h = (g-b)/d + (g < b ? 6 : 0); break;
                    case g: h = (b-r)/d + 2; break;
                    case b: h = (r-g)/d + 4; break;
                }
                h /= 6;
            }
            return [h*360, s*100, l*100];
        }

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1-l) / 100;
            const f = n => {
                const k = (n + h/30) % 12;
                const color = l - a * Math.max(Math.min(k-3, 9-k, 1), -1);
                return Math.round(255*color).toString(16).padStart(2,'0');
            };
            return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
        }

        function hexToRgb(hex) {
            hex = hex.replace('#','');
            if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
            const n = parseInt(hex, 16);
            return [(n>>16)&255, (n>>8)&255, n&255];
        }

        function generatePalettes(r, g, b) {
            const [h, s, l] = rgbToHsl(r, g, b);
            const isMonochrome = s < 10 || l < 12 || l > 92;
            let complements, monones;
            if (isMonochrome) {
                complements = ['#007AFF', '#E6B422', '#A52A2A'];
                monones = [
                    hslToHex(h, 0, Math.max(l-20,15)),
                    hslToHex(h, 0, l > 50 ? l-10 : l+15),
                    hslToHex(h, 0, Math.min(l+25,95))
                ];
            } else {
                const cH = (h+180) % 360;
                complements = [
                    hslToHex((cH-20+360)%360, s, Math.min(l+5,85)),
                    hslToHex(cH, s, l),
                    hslToHex((cH+20)%360, Math.max(s-10,20), Math.max(l-10,20))
                ];
                monones = [
                    hslToHex(h, Math.min(s+10,95), Math.max(l-15,15)),
                    hslToHex(h, Math.max(s-15,10), Math.min(l+15,90)),
                    hslToHex(h, Math.max(s-30,5), Math.min(l+25,95))
                ];
            }
            return { complements, monones };
        }

        // ===== COLOR WHEEL =====
        function drawColorWheel() {
            const canvas = document.getElementById('colorWheelCanvas');
            const ctx = canvas.getContext('2d');
            const size = 220;
            const cx = size/2, cy = size/2, r = size/2;

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - cx, dy = y - cy;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > r) continue;
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI + 180;
                    const saturation = (dist / r) * 100;
                    const lightness = 50;
                    ctx.fillStyle = `hsl(${angle}, ${saturation}%, ${lightness}%)`;
                    ctx.fillRect(x, y, 1, 1);
                }
            }

            // Center white dot area (no color = neutral)
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            grad.addColorStop(0, 'rgba(255,255,255,0.0)');
            grad.addColorStop(1, 'rgba(255,255,255,0.0)');
            ctx.fillStyle = grad;
            ctx.fill();
        }

        const wheelWrapper = document.getElementById('wheelWrapper');
        const wheelCanvas = document.getElementById('colorWheelCanvas');
        const wheelSelector = document.getElementById('wheelSelector');
        const wheelResultCard = document.getElementById('wheelResultCard');

        function pickColorFromWheel(e) {
            const rect = wheelCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            const scaleX = wheelCanvas.width / rect.width;
            const scaleY = wheelCanvas.height / rect.height;
            const px = x * scaleX;
            const py = y * scaleY;

            const cx = wheelCanvas.width/2, cy = wheelCanvas.height/2;
            const dx = px-cx, dy = py-cy;
            const dist = Math.sqrt(dx*dx+dy*dy);
            if (dist > cx) return;

            const ctx = wheelCanvas.getContext('2d');
            const pixel = ctx.getImageData(Math.round(px), Math.round(py), 1, 1).data;
            const [r2,g2,b2] = [pixel[0], pixel[1], pixel[2]];
            const hex = `#${r2.toString(16).padStart(2,'0')}${g2.toString(16).padStart(2,'0')}${b2.toString(16).padStart(2,'0')}`.toUpperCase();
            const [h2,s2,l2] = rgbToHsl(r2,g2,b2);

            // Move selector
            wheelSelector.style.display = 'block';
            wheelSelector.style.left = `${x}px`;
            wheelSelector.style.top = `${y}px`;
            wheelSelector.style.background = hex;

            // Update result
            document.getElementById('wheelColorBox').style.backgroundColor = hex;
            document.getElementById('wheelColorHex').textContent = hex;
            document.getElementById('wheelColorHsl').textContent = `H:${Math.round(h2)}° S:${Math.round(s2)}% L:${Math.round(l2)}%`;

            const palettes = generatePalettes(r2,g2,b2);
            palettes.complements.forEach((c,i) => {
                document.getElementById(`wComp${i+1}`).style.backgroundColor = c;
                document.getElementById(`wComp${i+1}Hex`).textContent = c;
            });
            palettes.monones.forEach((c,i) => {
                document.getElementById(`wMono${i+1}`).style.backgroundColor = c;
                document.getElementById(`wMono${i+1}Hex`).textContent = c;
            });

            wheelResultCard.classList.remove('hidden');
        }

        wheelCanvas.addEventListener('click', pickColorFromWheel);
        wheelCanvas.addEventListener('touchend', e => { e.preventDefault(); pickColorFromWheel(e); });

        window.addEventListener('load', drawColorWheel);

        // ===== CAMERA =====
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const placeholder = document.getElementById('placeholder');
        const pointerAim = document.getElementById('pointerAim');
        const resultCard = document.getElementById('resultCard');
        const btnLeaning = document.getElementById('btnLeaning');
        const btnCamera = document.getElementById('btnCamera');
        const actionBtn = document.getElementById('actionBtn');

        let stream = null;
        let isCameraActive = false;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
                placeholder.classList.add('hidden');
                pointerAim.style.display = 'block';
                isCameraActive = true;
            } catch(err) {
                alert("カメラの起動に失敗しました。");
                switchToLeaning();
            }
        }

        function stopCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;
            placeholder.classList.remove('hidden');
            pointerAim.style.display = 'none';
            resultCard.classList.remove('active');
            isCameraActive = false;
        }

        function switchToCamera() {
            btnLeaning.classList.remove('active');
            btnCamera.classList.add('active');
            startCamera();
        }

        function switchToLeaning() {
            btnCamera.classList.remove('active');
            btnLeaning.classList.add('active');
            stopCamera();
        }

        btnCamera.addEventListener('click', () => { if (!isCameraActive) switchToCamera(); });
        btnLeaning.addEventListener('click', () => { if (isCameraActive) switchToLeaning(); });

        actionBtn.addEventListener('click', () => {
            if (!isCameraActive) {
                openSearch();
                return;
            }
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const cx = Math.floor(canvas.width/2), cy = Math.floor(canvas.height/2);
            const pixel = ctx.getImageData(cx, cy, 1, 1).data;
            const [r,g,b] = [pixel[0], pixel[1], pixel[2]];
            const mainHex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`.toUpperCase();

            document.getElementById('pickedColorBox').style.backgroundColor = mainHex;
            document.getElementById('pickedColorHex').textContent = mainHex;

            const palettes = generatePalettes(r,g,b);
            palettes.complements.forEach((c,i) => {
                document.getElementById(`comp${i+1}`).style.backgroundColor = c;
                document.getElementById(`comp${i+1}Hex`).textContent = c;
            });
            palettes.monones.forEach((c,i) => {
                document.getElementById(`mono${i+1}`).style.backgroundColor = c;
                document.getElementById(`mono${i+1}Hex`).textContent = c;
            });
            resultCard.classList.add('active');
        });

        // ===== SEARCH =====
        const searchOverlay = document.getElementById('searchOverlay');
        const overlayDim = document.getElementById('overlayDim');
        const searchInput = document.getElementById('searchInput');
        const searchResultArea = document.getElementById('searchResultArea');

        // Color name database (Japanese & English)
        const COLOR_DB = [
            { names: ['赤','あか','red','レッド'], hex: '#E60012' },
            { names: ['ピンク','pink','桃色','もも'], hex: '#FF69B4' },
            { names: ['オレンジ','orange','橙','だいだい'], hex: '#FF6B00' },
            { names: ['黄色','きいろ','yellow','イエロー','黄'], hex: '#FFD900' },
            { names: ['黄緑','きみどり','yellow green','ライム'], hex: '#8BC34A' },
            { names: ['緑','みどり','green','グリーン'], hex: '#009944' },
            { names: ['ライトグリーン','light green','浅緑','薄緑'], hex: '#AACFAC' },
            { names: ['シアン','cyan','水色','みずいろ'], hex: '#00BCD4' },
            { names: ['青','あお','blue','ブルー'], hex: '#007BBB' },
            { names: ['ネイビー','navy','紺','こん','紺色'], hex: '#003F6E' },
            { names: ['紫','むらさき','purple','パープル','バイオレット','violet'], hex: '#9B007F' },
            { names: ['マゼンタ','magenta','赤紫'], hex: '#C2185B' },
            { names: ['茶色','ちゃいろ','brown','ブラウン'], hex: '#795548' },
            { names: ['ベージュ','beige','肌色','はだいろ','cream','クリーム'], hex: '#F5DEB3' },
            { names: ['白','しろ','white','ホワイト'], hex: '#FFFFFF' },
            { names: ['黒','くろ','black','ブラック'], hex: '#1D1D1F' },
            { names: ['グレー','灰色','はいいろ','gray','grey','グレイ'], hex: '#9E9E9E' },
            { names: ['金','きん','gold','ゴールド'], hex: '#E6B422' },
            { names: ['銀','ぎん','silver','シルバー'], hex: '#C0C0C0' },
            { names: ['珊瑚','さんご','coral','コーラル'], hex: '#FF6F61' },
            { names: ['ラベンダー','lavender'], hex: '#E6E6FA' },
            { names: ['ターコイズ','turquoise','ティール','teal'], hex: '#009688' },
            { names: ['インディゴ','indigo','藍色','あいいろ'], hex: '#3F51B5' },
            { names: ['深紅','しんく','crimson','クリムゾン'], hex: '#9D1B22' },
            { names: ['スカーレット','scarlet'], hex: '#FF2400' },
            { names: ['オリーブ','olive','オリーブ色'], hex: '#808000' },
            { names: ['カーキ','khaki'], hex: '#C3B091' },
            { names: ['マスタード','mustard'], hex: '#FFDB58' },
            { names: ['サーモン','salmon'], hex: '#FA8072' },
            { names: ['空色','そらいろ','sky blue','スカイブルー'], hex: '#87CEEB' },
        ];

        function searchColor(query) {
            query = query.trim().toLowerCase();
            if (!query) return null;

            // Try hex code
            let hexMatch = query.replace(/\s/g,'');
            if (!hexMatch.startsWith('#')) hexMatch = '#' + hexMatch;
            if (/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(hexMatch)) {
                const hex = hexMatch.toUpperCase();
                if (hex.length === 4) {
                    const exp = '#' + hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];
                    return { name: exp, hex: exp.toUpperCase() };
                }
                return { name: hex, hex: hex.toUpperCase() };
            }

            // Try name search
            for (const entry of COLOR_DB) {
                for (const name of entry.names) {
                    if (name.toLowerCase().includes(query) || query.includes(name.toLowerCase())) {
                        return { name: entry.names[0], hex: entry.hex };
                    }
                }
            }
            return null;
        }

        function renderSearchResult(result) {
            if (!result) {
                searchResultArea.innerHTML = '<div class="search-empty">色が見つかりませんでした<br>色名（赤、navy）またはカラーコード（#FF0000）で試してください</div>';
                return;
            }
            const [r,g,b] = hexToRgb(result.hex);
            const [h,s,l] = rgbToHsl(r,g,b);
            const palettes = generatePalettes(r,g,b);

            const compItems = palettes.complements.map(c => `
                <div class="search-result-palette-item">
                    <div class="search-result-palette-swatch" style="background:${c}"></div>
                    <span class="search-result-palette-hex">${c}</span>
                </div>`).join('');
            const monoItems = palettes.monones.map(c => `
                <div class="search-result-palette-item">
                    <div class="search-result-palette-swatch" style="background:${c}"></div>
                    <span class="search-result-palette-hex">${c}</span>
                </div>`).join('');

            searchResultArea.innerHTML = `
                <div class="search-result-card">
                    <div class="search-result-main">
                        <div class="search-result-swatch" style="background:${result.hex}"></div>
                        <div class="search-result-info">
                            <span class="search-result-name">${result.name}</span>
                            <span class="search-result-hex">${result.hex}</span>
                            <span class="search-result-hsl">H:${Math.round(h)}° S:${Math.round(s)}% L:${Math.round(l)}%</span>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <div class="search-result-palettes">
                        <span class="search-result-palette-label">Accent Colors（補色）</span>
                        <div class="search-result-palette-row">${compItems}</div>
                    </div>
                    <div class="divider"></div>
                    <div class="search-result-palettes">
                        <span class="search-result-palette-label">Tone on Tone（同系色）</span>
                        <div class="search-result-palette-row">${monoItems}</div>
                    </div>
                </div>`;
        }

        function openSearch() {
            searchOverlay.classList.add('active');
            overlayDim.classList.add('active');
            setTimeout(() => searchInput.focus(), 400);
        }

        function closeSearch() {
            searchOverlay.classList.remove('active');
            overlayDim.classList.remove('active');
            searchInput.blur();
        }

        document.getElementById('searchCloseBtn').addEventListener('click', closeSearch);
        overlayDim.addEventListener('click', closeSearch);

        document.getElementById('searchGoBtn').addEventListener('click', () => {
            const result = searchColor(searchInput.value);
            renderSearchResult(result);
        });

        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const result = searchColor(searchInput.value);
                renderSearchResult(result);
            }
        });

        // In camera mode, action btn shoots; in learning mode, opens search
        // (already handled in actionBtn click above)
    </script>
</body>
</html>
